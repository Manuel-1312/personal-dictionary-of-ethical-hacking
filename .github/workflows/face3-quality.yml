name: Face 3 — Quality checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Run markdownlint
        run: markdownlint "**/*.md" --fix --config .markdownlint.json || true
      - name: Check lint results
        run: |
          if [ -f markdownlint-report.txt ]; then
            cat markdownlint-report.txt
            exit 1
          fi
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install requirements
        run: python -m pip install markdown-it-py requests
      - name: Check for dead markdown links (README + key docs)
        run: |
          python - <<'PY'
import markdown_it_py
import requests
from pathlib import Path

def gather_links(path):
    text = path.read_text(encoding='utf-8')
    md = markdown_it_py.MarkdownIt()
    tokens = md.parse(text)
    for token in tokens:
        if token.type == 'link_open':
            for attr, val in token.attrs or []:
                if attr == 'href':
                    yield val

targets = [Path('README.md'), Path('conceptos/diccionario.md'), Path('CHEAT_SHEETS.md')]
failed = []
for path in targets:
    for link in gather_links(path):
        if link.startswith('http'):
            try:
                resp = requests.head(link, allow_redirects=True, timeout=5)
                if resp.status_code >= 400:
                    failed.append((link, resp.status_code))
            except Exception as e:
                failed.append((link, str(e)))
if failed:
    print('Links with issues:')
    for link, err in failed:
        print(link, err)
    raise SystemExit('Link check failed')
PY